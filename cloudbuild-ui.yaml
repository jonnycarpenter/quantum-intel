steps:
  # Build the Docker UI image using Dockerfile.ui
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/quantum-intel/quantum-intel-frontend:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/quantum-intel/quantum-intel-frontend:latest'
      - '-f'
      - 'Dockerfile.ui'
      - '.'

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/$PROJECT_ID/quantum-intel/quantum-intel-frontend']

  # Deploy to Cloud Run Service
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'quantum-intel-frontend'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/quantum-intel/quantum-intel-frontend:latest'
      - '--region'
      - 'us-central1'
      - '--project'
      - '$PROJECT_ID'
      - '--allow-unauthenticated'
      - '--set-secrets'
      - 'ANTHROPIC_API_KEY=anthropic-api-key:latest,EXA_API_KEY=EXA_API_KEY:latest,LOGO_DEV_TOKEN=LOGO_DEV_TOKEN:latest'
      - '--set-env-vars'
      - 'GCP_PROJECT_ID=$PROJECT_ID,BQ_DATASET_ID=quantum_ai_hub,GCP_REGION=us-central1,STORAGE_BACKEND=bigquery'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--port'
      - '8080'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/quantum-intel/quantum-intel-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
