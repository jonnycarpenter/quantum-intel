steps:
  # Build the Docker UI image using Dockerfile.ui
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/quantum-intel/quantum-intel-frontend:latest'
      - '-f'
      - 'Dockerfile.ui'
      - '.'

  # Push tag
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/quantum-intel/quantum-intel-frontend:latest']

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/quantum-intel/quantum-intel-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
